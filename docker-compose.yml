services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster -d dagster"]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/app/workspace.yaml"]
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_STORAGE_DIR: /opt/dagster/app/storage
      GIRDER_API_URL: ${GIRDER_API_URL}
      GIRDER_API_KEY: ${GIRDER_API_KEY}
      GIRDER_MODEL_ITEM_ID: ${GIRDER_MODEL_ITEM_ID}
      BASE_PARENT_ID: ${BASE_PARENT_ID}
      BASE_PARENT_TYPE: ${BASE_PARENT_TYPE}
    ports:
      - "3000:3000"
    volumes:
      - ./dagster_home:/opt/dagster/dagster_home
      - ./dagster_storage:/opt/dagster/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  dagster-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["dagster-daemon", "run", "--code-server-log-level", "error", "-w", "/opt/dagster/app/workspace.yaml"]
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_STORAGE_DIR: /opt/dagster/app/storage
      GIRDER_API_URL: ${GIRDER_API_URL}
      GIRDER_API_KEY: ${GIRDER_API_KEY}
      GIRDER_MODEL_ITEM_ID: ${GIRDER_MODEL_ITEM_ID}
      BASE_PARENT_ID: ${BASE_PARENT_ID}
      BASE_PARENT_TYPE: ${BASE_PARENT_TYPE}
    volumes:
      - ./dagster_home:/opt/dagster/dagster_home
      - ./dagster_storage:/opt/dagster/app/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dagster_postgres_data: